<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PixieVeil Dashboard</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
        <style>
            .metrics article {
                text-align: center;
                padding: 1.25rem 1rem;
            }
            .metrics article span {
                font-size: 2rem;
                font-weight: bold;
                color: var(--pico-primary);
            }
            .metrics.errors article span,
            .metrics article span.error-value {
                color: var(--pico-form-element-invalid-focus-color);
            }
            .defacing-disabled {
                color: var(--pico-muted-color);
                font-style: italic;
            }
            .metrics article strong {
                display: block;
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
                color: var(--pico-muted-color);
            }
            .metrics article small {
                color: var(--pico-muted-color);
                font-size: 0.875rem;
            }
            .status-bar {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem;
                align-items: center;
            }
            .led {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                font-size: 0.9rem;
            }
            .led-dot {
                display: inline-block;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background-color: var(--pico-muted-border-color);
                flex-shrink: 0;
                transition: background-color 0.3s;
            }
            .led-dot.active {
                background-color: var(--pico-form-element-valid-focus-color);
                box-shadow: 0 0 6px var(--pico-form-element-valid-focus-color);
            }
            .led-dot.active.led-error {
                background-color: var(--pico-form-element-invalid-focus-color);
                box-shadow: 0 0 6px var(--pico-form-element-invalid-focus-color);
            }
            .last-updated {
                font-size: 0.75rem;
                color: var(--pico-muted-color);
                text-align: right;
            }
        </style>
    </head>
    <body class="container">
        <hgroup>
            <h1>PixieVeil Dashboard</h1>
            <p>Real-time DICOM Anonymization Server</p>
        </hgroup>
        
        <header>
            <h2>System Status</h2>
            <article>
                <div class="status-bar" id="status-bar">
                    <span class="led"><span class="led-dot" id="led-server"></span>Server</span>
                    <span class="led"><span class="led-dot" id="led-receiving"></span>Receiving</span>
                    <span class="led"><span class="led-dot" id="led-waiting"></span>Waiting</span>
                    <span class="led"><span class="led-dot" id="led-defacing"></span>Defacing</span>
                    <span class="led"><span class="led-dot" id="led-exporting"></span>Exporting</span>
                </div>
                <p class="last-updated">Last updated: <span id="last-updated">Never</span></p>
            </article>
        </header>
        
        <main>
            <div id="metrics-container"><p aria-busy="true">Loading metrics…</p></div>
        </main>

        <footer class="grid">
            <button onclick="refreshData()" role="button">Refresh Data</button>
            <button onclick="toggleAutoRefresh()" id="auto-refresh-btn" role="button" class="secondary">Disable Auto Refresh</button>
        </footer>

        <script>
            let autoRefreshInterval = null;
            let isAutoRefreshEnabled = true;

            async function fetchStats() {
                try {
                    const response = await fetch('/stats');
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    const data = await response.json();
                    updateDashboard(data);
                } catch (error) {
                    console.error('Error fetching stats:', error);
                    const serverDot = document.getElementById('led-server');
                    serverDot.classList.add('active', 'led-error');
                    document.getElementById('metrics-container').innerHTML = '<p>Could not load metrics. Retrying…</p>';
                }
            }

            function formatValue(value) {
                if (typeof value === 'number') {
                    return value.toLocaleString();
                }
                return value;
            }

            function setLed(id, active, extraClass) {
                const dot = document.getElementById(id);
                dot.classList.toggle('active', active);
                if (extraClass) dot.classList.toggle(extraClass, active);
            }

            function updateDashboard(data) {
                const ps = data.pipeline_status || {};
                const serverUp = data.server_status === 'running';

                // Server LED: always lit, green when up, red when stopped
                const serverDot = document.getElementById('led-server');
                serverDot.classList.add('active');
                serverDot.classList.toggle('led-error', !serverUp);

                setLed('led-receiving', !!ps.receiving, null);
                setLed('led-waiting',   !!ps.waiting,   null);
                setLed('led-defacing',  !!ps.defacing,  null);
                setLed('led-exporting', !!ps.exporting, null);

                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();

                const container = document.getElementById('metrics-container');
                container.innerHTML = '';

                data.sections.forEach(section => {
                    const isDefacing = section.title === 'Defacing';

                    const sectionEl = document.createElement('section');
                    sectionEl.className = 'metrics';
                    if (section.class) {
                        sectionEl.classList.add(section.class);
                    }

                    const titleRow = document.createElement('div');
                    titleRow.style.display = 'flex';
                    titleRow.style.alignItems = 'baseline';
                    titleRow.style.gap = '0.75rem';

                    const title = document.createElement('h3');
                    title.style.margin = '0';
                    title.textContent = section.title;
                    titleRow.appendChild(title);

                    if (isDefacing) {
                        const badge = document.createElement('small');
                        if (data.defacing_enabled) {
                            badge.textContent = 'enabled';
                            badge.style.color = 'var(--pico-form-element-valid-focus-color)';
                        } else {
                            badge.textContent = 'disabled';
                            badge.className = 'defacing-disabled';
                        }
                        titleRow.appendChild(badge);
                    }

                    sectionEl.appendChild(titleRow);

                    if (isDefacing && !data.defacing_enabled) {
                        const msg = document.createElement('p');
                        msg.className = 'defacing-disabled';
                        msg.textContent = 'Defacing is not enabled in the current configuration.';
                        sectionEl.appendChild(msg);
                        container.appendChild(sectionEl);
                        return;
                    }

                    const grid = document.createElement('div');
                    grid.className = 'grid';

                    section.metrics.forEach(metric => {
                        const article = document.createElement('article');

                        const label = document.createElement('strong');
                        label.textContent = metric.label;
                        article.appendChild(label);

                        const valueSpan = document.createElement('span');
                        let valueText = formatValue(metric.value);
                        if (metric.suffix) valueText += ' ' + metric.suffix;
                        valueSpan.textContent = valueText;
                        if (isDefacing && metric.label === 'Errors' && metric.value > 0) {
                            valueSpan.classList.add('error-value');
                        }
                        article.appendChild(valueSpan);

                        if (metric.sub_value !== undefined) {
                            const subLine = document.createElement('small');
                            subLine.style.display = 'block';
                            let subText = formatValue(metric.sub_value);
                            if (metric.sub_suffix) subText += ' ' + metric.sub_suffix;
                            subLine.textContent = subText;
                            article.appendChild(subLine);
                        }

                        grid.appendChild(article);
                    });

                    sectionEl.appendChild(grid);
                    container.appendChild(sectionEl);
                });
            }

            function refreshData() {
                fetchStats();
            }

            function toggleAutoRefresh() {
                const btn = document.getElementById('auto-refresh-btn');
                if (isAutoRefreshEnabled) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                    isAutoRefreshEnabled = false;
                    btn.textContent = 'Enable Auto Refresh';
                    btn.classList.remove('secondary');
                } else {
                    autoRefreshInterval = setInterval(fetchStats, 5000);
                    isAutoRefreshEnabled = true;
                    btn.textContent = 'Disable Auto Refresh';
                    btn.classList.add('secondary');
                }
            }

            document.addEventListener('DOMContentLoaded', function() {
                fetchStats();
                autoRefreshInterval = setInterval(fetchStats, 5000);
            });
        </script>
    </body>
</html>
